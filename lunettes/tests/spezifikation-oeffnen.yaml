interaction:
  id: spezifikation-oeffenen
  version: 1.0

  video:
    wait_between_steps: 1000
    resolution:
      width: 1280
      height: 720

  environment:
    start:
      script: ./lunettes/env/start.sh
    check:
      script: ./lunettes/env/check.sh
    reset:
      script: ./lunettes/env/reset.sh
    stop:
      script: ./lunettes/env/stop.sh

  data:
    runtime:
      base_url: http://localhost:5173
    actor:
      username: schulte
      password: testtest
    spezifikation: "Spezifikation {{randomNumber()}}"

  flow:
    - id: login
      include: fragments/auth/login.yml
      with:
        username: "{{actor.username}}"
        password: "{{actor.password}}"

    - id: open-spezifikation
      include: fragments/spezifikation/open-by-title.yaml
      with:
        title: "aufnahme"
        select: 1

