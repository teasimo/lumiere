interaction:
  id: idee-workflow
  version: 1.0

  video:
    wait_between_steps: 1000
    resolution:
      width: 1280
      height: 720

  environment:
    start:
      script: ./lunettes/env/start.sh
    check:
      script: ./lunettes/env/check.sh
    reset:
      script: ./lunettes/env/reset.sh
    stop:
      script: ./lunettes/env/stop.sh

  data:
    runtime:
      base_url: http://localhost:5173
    actor:
      username: schulte
      password: testtest
    spezifikation: "Spezifikation {{randomNumber()}}"

  flow:
    - id: login
      include: fragments/auth/login.yml
      with:
        username: "{{actor.username}}"
        password: "{{actor.password}}"

    - id: create-idee-referenz
      include: fragments/idee/create-referenz.yaml
      with:
        title: "Neue Idee"
        description: "Beschreibung der Idee"

    - id: open-spezifikation
      include: fragments/spezifikation/open-by-title.yaml
      with:
        title: "aufnahme"
        select: 1

    - id: anforderungsviewer-toggle-plaintext-button
      ifnot:
        - target: anforderungsviewer-toggle-plaintext-button
          state:
            aria-pressed: true
      interaction:
        type: click
        target:
          testid: anforderungsviewer-toggle-plaintext-button    

    - id: step-001-append
      interaction:
        type: append
        target:
          testid: anforderungsviewer-plaintext-editor-content
        value: "A: Dies ist eine neue Anforderung.\n"

    - id: step-001
      interaction:
        type: append
        target:
          testid: anforderungsviewer-plaintext-editor-content
        value: "\nA: Dies ist eine weitere Anforderung.\nG: Mit Geschäftsregel.\nInfo: Und Infos.\nKlärungsbedarf: Und Klärungsbedarf."

    - id: anforderungsviewer-save-plaintext-button
      interaction:
        type: click

        target:
          testid: anforderungsviewer-save-plaintext-button

    - id: app-confirm-ok-button
      interaction:
        type: click
        target:
          testid: app-confirm-ok-button

    - id: anforderungsviewer-left-tab-spezifikationen

      interaction:
        type: click

        target:
          testid: anforderungsviewer-left-tab-spezifikationen
    

