interaction:
  id: login
  version: 1.0

  video:
    wait_between_steps: 1000
    resolution:
      width: 1280
      height: 720
  
  environment:
    start:
      script: ./lunettes/env/start.sh
    check:
      script: ./lunettes/env/check.sh
    reset:
      script: ./lunettes/env/reset.sh
    stop:
      script: ./lunettes/env/stop.sh

  data:
    runtime:
      base_url: http://localhost:5173
    actor:
      username: schulte
      password: testtest

  flow:
    - id: open-browser
      interaction:
        type: open
        target:
          url: "{{runtime.base_url}}/app/home"
      expected_results:
        - target:
            testid: login-username-input
          state:
            visible: true
      didactics:
        purpose:
          text: >
            Die Beratungsanfrage-Übersicht wird
            geöffnet.
    - id: fill-username
      interaction:
        type: fill
        target:
          testid: login-username-input
        value: "{{actor.username}}"
      expected_results:
        - target:
            testid: login-username-input
          state:
            value-present: true
      didactics:
            purpose:
              text: >
                Der Benutzername wird in das entsprechende Eingabefeld eingetragen.
            explanation:
              text: >
                Der Benutzername ist erforderlich, um sich im System anzumelden.
            warning:
              text: >
                Verwenden Sie nur den Ihnen zugewiesenen Benutzerzugang.
            consequence:
              text: >
                Das System kann den Benutzer anschließend authentifizieren.
    - id: fill-password
      interaction:
        type: fill
        target:
          testid: login-password-input
        value: "{{actor.password}}"
      expected_results:
        - target:
            testid: login-password-input
          state:
            value-present: true
    - id: submit-login    
      interaction:
        type: click
        target:
          testid: login-submit-button
      expected_results:
        - target:
            url: "{{runtime.base_url}}/app/home"
            state:
              visible: true
        - target:
            testid: app-header-open-profile-button
          state:
            visible: true

