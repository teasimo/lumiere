interaction:
  id: login
  version: 1.0

  video:
    wait_between_steps: 1000
    resolution:
      width: 1280
      height: 720
  
  
  data:
    runtime:
      base_url: https://neo-test.de
    actorSPS:
      username: testuser1@portal.de
      password: "Testuser_Portal1!"
    actorNEO:
      username: schule_05423_schulleitung
      password: "!Neo-2405Neo!"
    schueler:
      # vorname: "Sophie Charlotte"
      # nachname: "Becker"
      vorname: "Max {{randomNumber()}}"
      nachname: "Mustermann"
      geburtsdatum: 01.01.2020
      geburtsort: Musterstadt
      adresseSuche: Fuchsbau 6 Emmerke
      ez1:
        anrede: Frau
        vorname: Erika
        nachname: Mustermann
        geburtsdatum: 01.01.1975
        geburtsort: Musterstadt
        adresseSuche: Fuchsbau 6 Emmerke
      ez2:
        anrede: Herr
        vorname: Erich
        nachname: Mustermann
        geburtsdatum: 01.01.1970
        geburtsort: Musterstadt
        adresseSuche: Fuchsbau 6 Emmerke
   
  flow:
    - id: neo-verknuepfungscode
      include: /sus/verknuepfungscode-create.yaml
      with:
        actor.username: "{{actorNEO.username}}"
        actor.password: "{{actorNEO.password}}"
        schueler.nachname: "{{schueler.nachname}}"
        schueler.vorname: "{{schueler.vorname}}"
        schueler.geburtsdatum: "{{schueler.geburtsdatum}}"
        schueler.geburtsort: "{{schueler.geburtsort}}"
        schueler.adresseSuche: "{{schueler.adresseSuche}}"
        schueler.ez1.nachname: "{{schueler.ez1.nachname}}"
        schueler.ez1.vorname: "{{schueler.ez1.vorname}}"
        schueler.ez1.anrede: "{{schueler.ez1.anrede}}"
        schueler.ez1.adresseSuche: "{{schueler.ez1.adresseSuche}}"
        schueler.ez2.nachname: "{{schueler.ez2.nachname}}"
        schueler.ez2.vorname: "{{schueler.ez2.vorname}}"
        schueler.ez2.anrede: "{{schueler.ez2.anrede}}"
        schueler.ez2.adresseSuche: "{{schueler.ez2.adresseSuche}}"
      outputs:
        verknuepfungscode: "{{verknuepfungscode}}"

    - id: sps-login
      include: /auth/sps-login.yaml
      with:
        username: "{{actorSPS.username}}"
        password: "{{actorSPS.password}}"
    
    - id: sps-verknuepfen
      include: /sus/sps/verknuepfen.yaml
      with:
        verknuepfungscode: "{{verknuepfungscode}}"


    - id: bearbeiten_btn/bearbeiten_btn~1/kindDatenBearbeiten
      
      interaction:
        type: click

        target:
          data-id: bearbeiten_btn/bearbeiten_btn~1/kindDatenBearbeiten


    - id: q-app      
      interaction:
        type: click

        target:
          id: q-app


    - id: g_person_bz
      if:
        - target:
            data-id: g_person_bz
          state:
            visible: true
            wait_ms: 3000

      interaction:
        type: click

        target:
          data-id: g_person_bz


    - id: g_person_bz_hat_aufenthaltsbestimmungsrecht/g_person_bz_hat_aufenthaltsbestimmungsrecht~1/hat_aufenthaltsbestimmungsrecht

      interaction:
        type: click

        target:
          data-id: g_person_bz_hat_aufenthaltsbestimmungsrecht/g_person_bz_hat_aufenthaltsbestimmungsrecht~1/hat_aufenthaltsbestimmungsrecht


    - id: g_person_sorg/g_person_sorg~1/sorgerecht

      interaction:
        type: click

        target:
          data-id: g_person_sorg/g_person_sorg~1/sorgerecht


    - id: g_person_sorg/g_person_sorg~1/sorgerecht/option/2007_07

      interaction:
        type: click

        target:
          data-id: g_person_sorg/g_person_sorg~1/sorgerecht/option/2007_07


    - id: g_person_bz/g_verbindung_schueler/beziehungsart

      interaction:
        type: click

        target:
          data-id: g_person_bz/g_verbindung_schueler/beziehungsart


