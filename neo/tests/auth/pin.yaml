fragment:
  id: pin

  parameters:
    - pin

  flow:
    - id: pin-erforderlich/input/pin
      if:
        - target:
            data-id: pin-erforderlich/input/pin
          state:
            visible: true
            wait_ms: 3000
      interaction:
        type: fill

        target:
          data-id: pin-erforderlich/input/pin
        value: "{{pin}}"

    - id: pin-erforderlich/button/continue
      if:
        - target:
            data-id: pin-erforderlich/button/continue
          state:
            visible: true
            wait_ms: 3000
      interaction:
        type: click

        target:
          data-id: pin-erforderlich/button/continue