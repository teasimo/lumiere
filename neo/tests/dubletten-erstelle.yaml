# Storybook


interaction:
  id: dublette-erestellen
  version: 1.0

  video:
    wait_between_steps: 1000
    resolution:
      width: 1280
      height: 720
  
  
  data:
    runtime:
      base_url: https://neo-test.de
    actor:
      username: schule_05423_schulleitung
      password: "!Neo-2405Neo!"
    random: "{{randomNumber()}}"
    schueler:
      vorname1: "Marie"
      vorname2: "Maria"
      nachname: "Mustermann"
      geburtsdatum: 01.01.2020
      geburtsort: Musterstadt
      adresseSuche: Fuchsbau 6 Emmerke
      ez1:
        anrede: Frau
        vorname: Erika
        nachname: Mustermann
        geburtsdatum: 01.01.1975
        geburtsort: Musterstadt
        adresseSuche: Fuchsbau 6 Emmerke
      ez2:
        anrede: Herr
        vorname: Erich
        nachname: Mustermann
        geburtsdatum: 01.01.1970
        geburtsort: Musterstadt
        adresseSuche: Fuchsbau 6 Emmerke
  flow:
    - id: neo-login
      include: /auth/neo-login.yaml
      with:
        username: "{{actor.username}}"
        password: "{{actor.password}}"

    - id: dublette anlegen
      flow:
      - id: meldedaten-create1
        include: /sus/meldedaten-create.yaml
        with:
          schueler.nachname: "{{schueler.nachname}} {{random}}"
          schueler.vorname: "{{schueler.vorname1}} {{random}}"
          schueler.geburtsdatum: "{{schueler.geburtsdatum}}"
          schueler.geburtsort: "{{schueler.geburtsort}}"
          schueler.adresseSuche: "{{schueler.adresseSuche}}"
          schueler.ez1.nachname: "{{schueler.ez1.nachname}}"
          schueler.ez1.vorname: "{{schueler.ez1.vorname}}"
          schueler.ez1.anrede: "{{schueler.ez1.anrede}}"
          schueler.ez1.adresseSuche: "{{schueler.ez1.adresseSuche}}"
          schueler.ez2.nachname: "{{schueler.ez2.nachname}}"
          schueler.ez2.vorname: "{{schueler.ez2.vorname}}"
          schueler.ez2.anrede: "{{schueler.ez2.anrede}}"
          schueler.ez2.adresseSuche: "{{schueler.ez2.adresseSuche}}"

      - id: meldedaten-create2
        include: /sus/meldedaten-create.yaml
        with:
          schueler.nachname: "{{schueler.nachname}} {{random}}"
          schueler.vorname: "{{schueler.vorname2}} {{random}}"
          schueler.geburtsdatum: "{{schueler.geburtsdatum}}"
          schueler.geburtsort: "{{schueler.geburtsort}}"
          schueler.adresseSuche: "{{schueler.adresseSuche}}"
          schueler.ez1.nachname: "{{schueler.ez1.nachname}}"
          schueler.ez1.vorname: "{{schueler.ez1.vorname}}"
          schueler.ez1.anrede: "{{schueler.ez1.anrede}}"
          schueler.ez1.adresseSuche: "{{schueler.ez1.adresseSuche}}"
          schueler.ez2.nachname: "{{schueler.ez2.nachname}}"
          schueler.ez2.vorname: "{{schueler.ez2.vorname}}"
          schueler.ez2.anrede: "{{schueler.ez2.anrede}}"
          schueler.ez2.adresseSuche: "{{schueler.ez2.adresseSuche}}"
        
      - id: create-schuelerdatensaetze1
        include: /sus/aufforderungsschreiben-create.yaml
        with:
          schueler.nachname: "{{schueler.nachname}} {{random}}" 
          schueler.vorname: "{{schueler.vorname1}} {{random}}"

      # reset filter
      - id: root/btn/action-reset-settings
        click: "@root/btn/action-reset-settings"

      - id: Zurücksetzen
        interaction:
          type: click

          target:
            text: Zurücksetzen

      - id: create-schuelerdatensaetze2
        include: /sus/aufforderungsschreiben-create.yaml
        with:
          schueler.nachname: "{{schueler.nachname}} {{random}}"
          schueler.vorname: "{{schueler.vorname2}} {{random}}"
        



    
