fragment:
  id: filter-vorname-nachname

  parameters:
    - nachname
    - vorname    
  flow:
    - id: filters
      click: filters
    - id: filters/basic/choose/vornamen
      interaction:
        type: select
        target:
          data-id: filters/basic/choose
        value: Vornamen
    - id: filters/basic/0
      fill: filters/basic/0
      value: "{{vorname}}"
    - id: filters/basic/choose/familienname
      interaction:
        type: select
        target:
          data-id: filters/basic/choose
        value: Familienname
    - id: filters/basic/1
      fill: filters/basic/1
      value: "{{nachname}}"
    - id: filters/apply
      click: filters/apply