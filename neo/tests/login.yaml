interaction:
  id: login
  version: 1.0

  video:
    wait_between_steps: 1000
    resolution:
      width: 1280
      height: 720
  
  
  data:
    runtime:
      base_url: https://neo-test.de
    actor:
      username: ealles
      password: "!Neo-2405Neo!"
  flow:
    - id: open-browser
      interaction:
        type: open
        target:
          url: "{{runtime.base_url}}"
      expected_results:
        - target:
            data-id: login/input/user
          state:
            visible: true
     
    - id: fill-username
      interaction:
        type: fill
        target:
          data-id: login/input/user
        value: "{{actor.username}}"
      expected_results:
        - target:
            data-id: login/input/user
          state:
            value-present: true
      
    - id: fill-password
      interaction:
        type: fill
        target:
          data-id: login/input/pass
        value: "{{actor.password}}"
      expected_results:
        - target:
            data-id: login/input/pass
          state:
            value-present: true
    
    - id: submit-login    
      interaction:
        type: click
        target:
          data-id: login/button/submit
      expected_results:
        - target:
            url: "{{runtime.base_url}}/ssvn/neo/#/"
          state:
            url-match: true
    
    - id: confirm-organization
      interaction:
        type: click
        target:
          data-id: login/context/button/submit
      expected_results:
        - target:
            data-id: logo
          state:
            visible: true

