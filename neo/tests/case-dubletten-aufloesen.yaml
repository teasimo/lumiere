interaction:
  id: dublette-erstellen
  version: 1.0

  
  video:
    autoscroll_smooth: false
    wait_between_steps: 1000
    resolution:
      width: 1280
      height: 720

  presentation:
    indicators:
      click:
        enabled: true
        before_ms: 100
        after_ms: 100
        fade_ms: 50  
  
  data:
    runtime:
      base_url: https://neo-test.de
    actor:
      username: schule_05423_schulleitung
      password: "!Neo-2405Neo!"
    random: "{{randomNumber()}}"
    # random: "381893"
    schueler:
      vorname1: "Marie"
      vorname2: "Maria"
      nachname: "Mustermann"
      geburtsdatum: 01.01.2020
      geburtsort: Musterstadt
      adresseSuche: Fuchsbau 6 Emmerke
      ez1:
        anrede: Frau
        vorname: Laura
        nachname: Mustermann
        geburtsdatum: 01.01.1975
        geburtsort: Musterstadt
        adresseSuche: Fuchsbau 6 Emmerke
      ez2:
        anrede: Herr
        vorname: Niklas
        nachname: Mustermann
        geburtsdatum: 01.01.1970
        geburtsort: Musterstadt
        adresseSuche: Fuchsbau 6 Emmerke
  flow:
    - id: neo-login
      include: /auth/neo-login.yaml
      with:
        username: "{{actor.username}}"
        password: "{{actor.password}}"

    - id: vorbereitung
      flow:
      - id: dublette-anlegen
        flow:
        - id: vorbereitung-meldedaten-create1
          include: /sus/meldedaten-create.yaml
          with:
            schueler.nachname: "{{schueler.nachname}} {{random}}"
            schueler.vorname: "{{schueler.vorname1}} {{random}}"
            schueler.geburtsdatum: "{{schueler.geburtsdatum}}"
            schueler.geburtsort: "{{schueler.geburtsort}}"
            schueler.adresseSuche: "{{schueler.adresseSuche}}"
            schueler.ez1.nachname: "{{schueler.ez1.nachname}}"
            schueler.ez1.vorname: "{{schueler.ez1.vorname}}"
            schueler.ez1.anrede: "{{schueler.ez1.anrede}}"
            schueler.ez1.adresseSuche: "{{schueler.ez1.adresseSuche}}"
            schueler.ez2.nachname: "{{schueler.ez2.nachname}}"
            schueler.ez2.vorname: "{{schueler.ez2.vorname}}"
            schueler.ez2.anrede: "{{schueler.ez2.anrede}}"
            schueler.ez2.adresseSuche: "{{schueler.ez2.adresseSuche}}"

        - id: vorbereitung-meldedaten-create2
          include: /sus/meldedaten-create.yaml
          with:
            schueler.nachname: "{{schueler.nachname}} {{random}}"
            schueler.vorname: "{{schueler.vorname2}} {{random}}"
            schueler.geburtsdatum: "{{schueler.geburtsdatum}}"
            schueler.geburtsort: "{{schueler.geburtsort}}"
            schueler.adresseSuche: "{{schueler.adresseSuche}}"
            schueler.ez1.nachname: "{{schueler.ez1.nachname}}"
            schueler.ez1.vorname: "{{schueler.ez1.vorname}}"
            schueler.ez1.anrede: "{{schueler.ez1.anrede}}"
            schueler.ez1.adresseSuche: "{{schueler.ez1.adresseSuche}}"
            schueler.ez2.nachname: "{{schueler.ez2.nachname}}"
            schueler.ez2.vorname: "{{schueler.ez2.vorname}}"
            schueler.ez2.anrede: "{{schueler.ez2.anrede}}"
            schueler.ez2.adresseSuche: "{{schueler.ez2.adresseSuche}}"
          
      - id: navigate-start
        include: /navigation/hauptmenue-navigiere.yaml
        with:
          hauptmenue-data-id: "menu/link/"

    # - id: asd
    #   chapter:
    #     text: Datenqualität
    #   didactics:
    #       purpose:
    #           text: >-
    #             Datenqualität ist in der Verwaltung sehr wichtig, um immer auf Basis der richtigen Informationen zu entscheiden. Notwendig ist es also, dass pro Schüler*in immer genau nur ein Datensatz mit allen bekannten Informationen vorliegt.
    #             Daher zeigen wir Ihnen im zum Einen wie NEO Niedersachsen Sie dabei unterstützt, dass keine doppelten Datensätze angelegt werden. Zum anderen wird Ihnen demonstriert, wie doppelte Datensätze, die dennoch entstanden sind, zu einem Datensatz zusammengeführt werden können.

    - id: navigate-meldedaten            
      include: /navigation/untermenue-navigiere.yaml
      with:
        hauptmenue-data-id: "menu/item/schueler/"
        untermenue-data-id: "menu/link/schueler/meldedaten/"
      presentation:
        video:
          start: before        
        didactics:          
          purpose:
              text: >-
                Datenqualität ist in der Verwaltung sehr wichtig, um immer auf Basis der richtigen Informationen zu entscheiden. Notwendig ist es also, dass pro Schüler*in immer genau nur ein Datensatz mit allen bekannten Informationen vorliegt.
                Daher zeigen wir Ihnen im zum Einen wie NEO Niedersachsen Sie dabei unterstützt, dass keine doppelten Datensätze angelegt werden. Zum anderen wird Ihnen demonstriert, wie doppelte Datensätze, die dennoch entstanden sind, zu einem Datensatz zusammengeführt werden können.
          explanation:
            text: Es gibt für Schüler zwei Stellen an denen Schüler-Datensätze entstehen können. Dies ist zum einen der Bereich der Meldedaten. 


      
    - id: create-filter-sus
      presentation:        
          didactics:          
            purpose:
              text: NEO Niedersachsen prüft vor jeder Erstellung und Bearbeitung, ob ein bereits ein weiterer Datensatz mit gleichen Namen, Geburtstag und Geburtsort vorliegt. 
            explanation:
              text: Zur Demonstration öffnen wir nun einen Datensatz und passen den Namen an, sodass er einem bereits bekannten entspricht.
     
      include: /sus/filter-vorname-nachname.yaml
      with:
        vorname: "{{schueler.vorname1}} {{random}}"
        nachname: "{{schueler.nachname}} {{random}}"      

    - id: datensatz öffnen
      click: "controlBtn/action-detaillink"
    
    - id: g_person_angaben/g_person_angaben~2/vornamen
      fill: g_person_angaben/g_person_angaben~2/vornamen
      value: "{{schueler.vorname2}} {{random}}"

    - id: save
      presentation:
          didactics:
            purpose: 
              text: Es wurde auf Basis der genannten Kriterien ein weiterer Datensatz für diese Schüler*in identifiziert und daher weist NEO Niedersachsen Sie darauf hin. Falls man gerade dabei ist diesen Datensatz anzulegen, sollte man überlicherweise an dieser Stelle abbrechen.
              
      flow:  
      - id: btn/action-save
        interaction:
          type: click
          target:
            data-id: btn/action-save
        


      - id: Dialog-bestaetigen       
        click:
          text: Ja

    - id: loeschen
      flow:
      - id: navigate-meldedaten2
        include: /navigation/untermenue-navigiere.yaml
        with:
          hauptmenue-data-id: "menu/item/schueler/"
          untermenue-data-id: "menu/link/schueler/meldedaten/"

      - id: filter-reset
        flow:
        - id: root/btn/action-reset-settings
          click: "@root/btn/action-reset-settings"

        - id: Zurücksetzen
          click:
            text: Zurücksetzen
      
        
      - id: create-filter-sus2
        include: /sus/filter-vorname-nachname.yaml
        with:
          vorname: "{{schueler.vorname2}} {{random}}"
          nachname: "{{schueler.nachname}} {{random}}"

      - id: preview-oeffnen
        click: "list-item/1/toggleDetails"
      
      - id: datensatz-loeschen
        click: "detailInfo~1/btn/action-remove"

      - id: datensatz-loeschen-bestaetigen
        click:        
          text: Ja
      presentation:
        didactics:
          explanation:
            Wenn der Datensatz dennoch angelegt wurde, kann er im Bereich der Meldedaten aber auch wieder gelöscht werden.          
          warning:
            text: Die Löschung ist nur so lange möglich, wie kein Aufforderungsschreiben erzeugt wurde. Ab der Erstellung des Aufforderungsschreibens können die Daten im Bereich Meldedaten nicht mehr bearbeitet werden. Dann ist der Bereich "Schüler*innen" der Ort der Datenpflege.
      

