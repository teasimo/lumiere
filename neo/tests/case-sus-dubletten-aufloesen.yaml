      value: "{{schueler.vorname2}} {{random}}"

    - id: save
      flow:  
      - id: btn/action-save
        interaction:
          type: click
          target:
            data-id: btn/action-save
        


      - id: Dialog-bestaetigen       
        click:
          text: Ja

    - id: navigate-schueler2            
      include: /navigation/untermenue-navigiere.yaml
      with:
        hauptmenue-data-id: "menu/item/schueler/"
        untermenue-data-id: "menu/link/schueler/schueler/"

    - id: filter-reset2
      flow:
      - id: root/btn/action-reset-settings
        click: "@root/btn/action-reset-settings"

      - id: Zurücksetzen
        click:
          text: Zurücksetzen

    - id: create-filter-sus2
      flow:
      - id: filters
        click: filters
      - id: filters/basic/choose
        click: filters/basic/choose
      - id: filters/basic/choose/vornamen
        click: filters/basic/choose/vornamen
        # es gibt bereits feste filter
      - id: filters/basic/1
        fill: filters/basic/1
        value: "{{schueler.vorname2}} {{random}}"
      - id: filters/basic/choose2
        click: filters/basic/choose
      - id: filters/basic/choose/familienname
        click: filters/basic/choose/familienname
      - id: filters/basic/2
        fill: filters/basic/2
        value: "{{schueler.nachname}} {{random}}"
      - id: filters/apply
        click: filters/apply

    - id: datensatz öffnen
      click: "controlBtn/action-detaillink"
    
    - id: Einstellungen-oeffnen
      click: 
        text: "Einstellungen"
    
    - id: btn_container/btn_container~1/link_schueler_dublette
      click: btn_container/btn_container~1/link_schueler_dublette

    - id: sus-auswählen

      interaction:
        type: click

        target:
          aria-label: "{{schueler.nachname}} {{random}}, {{schueler.vorname2}} {{random}} markieren"

    - id: btn_container/btn_container~1/link_schueler_dublette/uebernehmen
      click: btn_container/btn_container~1/link_schueler_dublette/uebernehmen

    - id: g_linked/$data0/verschmelzen-btn
      click: g_linked/$data0/verschmelzen-btn

    - id: g_all_select_btn/g_all_select_btn~1/btn_select_all
      click: g_all_select_btn/g_all_select_btn~1/btn_select_all

    - id: g_action_btns/g_content/btn_merge
      click: g_action_btns/g_content/btn_merge

    - id: ja-verschmelzen
      click:
        text: Ja

    - id: click-Doku
      click:
        text: "Schüler*innen-Dublette verschmolzen"


