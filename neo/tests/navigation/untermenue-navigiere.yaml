fragment:
  id: untermenue-navigiere

  parameters:
    - hauptmenue-data-id
    - untermenue-data-id
  flow:

    - id: button/menu-toggle

      interaction:
        type: click

        target:
          data-id: button/menu-toggle

    - id: Hauptmenüpunkt

      interaction:
        type: click

        target:
          data-id: "{{hauptmenue-data-id}}"

    - id: Untermenüpunkt

      interaction:
        type: click

        target:
          data-id: "{{untermenue-data-id}}"

    - id: pin
      include: /auth/pin.yaml
      with:
        pin: "2308"

      # Hauptmenü schließen, falls es noch offen ist (was der Fall sein kann, wenn die PIN nicht abgefragt wird.)
    - id: button/menu-toggle2
      if:
        target:
          data-id: button/menu-toggle
        state:
          aria-expanded: true

      interaction:
        type: click

        target:
          data-id: button/menu-toggle