fragment:
  id: meldedaten-aufforderungsschreiben-create
  
  parameters:
  - schueler.nachname
  - schueler.vorname

  outputs:
    - verknuepfungscode

  flow:
    - id: button/menu-toggle

      interaction:
        type: click

        target:
          data-id: button/menu-toggle

    - id: menu/item/schueler/

      interaction:
        type: click

        target:
          data-id: menu/item/schueler/


    - id: menu/link/schueler/meldedaten/

      interaction:
        type: click

        target:
          data-id: menu/link/schueler/meldedaten/

    - id: pin
      include: /auth/pin.yaml
      with:
        pin: "2308"

    - id: filter-vorname-nachname
      include: /sus/filter-vorname-nachname.yaml
      with:
        nachname: "{{schueler.nachname}}"
        vorname: "{{schueler.vorname}}"

          

    - id: controlBtn/actions
      interaction:
        type: click
        target:
          data-id: controlBtn/actions


    - id: action-mehrfachauswahl

      interaction:
        type: click

        target:
          aria-label: Mehrfachauswahl


    - id: q-app

      interaction:
        type: click

        target:
          id: q-app

    - id: sus-auswählen

      interaction:
        type: click

        target:
          aria-label: "{{schueler.nachname}}, {{schueler.vorname}} markieren"


        expected_results:
          - target:
              aria-label: "{{schueler.nachname}}, {{schueler.vorname}} markieren"
            state:
              aria-checked: true
    
    - id: controlBtn/actions

      interaction:
        type: click

        target:
          data-id: controlBtn/actions

    - id: menuitem-aufforderung-nur-verknuepfungscode
      interaction:
        type: click
        target:
          text: Aufforderung zur Schulanmeldung (Nur Verknüpfungscode)

    - id: Dialog-bestaetigen       
      interaction:
        type: click
        target:
          text: Ja

    - id: extract-verknuepfungscode-pdf
      interaction:
        type: extract-pdf-code
        pdfPath: temp/testfiles/login/downloaded.pdf
        regex: '[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}'
        output: verknuepfungscode