fragment:
  id: sus-filter-vorname-nachname

  parameters:
    - nachname
    - vorname    
  flow:
    - id: filters
      click: filters
    - id: filters/basic/choose/scroll-vornamen
      interaction:
        type: scroll
        target:
          data-id: filters/basic/choose
        only_if_not_visible: true
        focus: false
    - id: filters/basic/choose/vornamen
      interaction:
        type: select
        target:
          data-id: filters/basic/choose
        value: Vornamen
      # es gibt bereits einen default filter, weswegen index 0 überspurngen wird.
    - id: filters/basic/1
      fill: filters/basic/1
      value: "{{vorname}}"
    - id: filters/basic/choose/scroll-familienname
      interaction:
        type: scroll
        target:
          data-id: filters/basic/choose
        only_if_not_visible: true
        focus: false
    - id: filters/basic/choose/familienname
      interaction:
        type: select
        target:
          data-id: filters/basic/choose
        value: Familienname
    - id: filters/basic/2
      fill: filters/basic/2
      value: "{{nachname}}"
    - id: filters/apply
      click: filters/apply