fragment:
  id: sps-login

  parameters:
    - username
    - password

  flow:
    - id: open-browser
      interaction:
        type: open
        target:
          url: "{{runtime.base_url}}/portal"

    - id: button/user-menu-toggle
      if:
        - target:
            data-id: button/user-menu-toggle
          state:
            visible: true
            wait_ms: 3000
      interaction:
        type: click
        target:
          data-id: button/user-menu-toggle
      expected_results:
        - target:
            data-id: login/input/user
          state:
            visible: true
     
    - id: fill-username
      interaction:
        type: fill
        target:
          data-id: login/input/user
        value: "{{username}}"
      expected_results:
        - target:
            data-id: login/input/user
          state:
            value-present: true
      
    - id: fill-password
      interaction:
        type: fill
        target:
          data-id: login/input/pass
        value: "{{password}}"
      expected_results:
        - target:
            data-id: login/input/pass
          state:
            value-present: true
    
    - id: submit-login    
      interaction:
        type: click
        target:
          data-id: login/button/submit
      expected_results:
        - target:
            url: "{{runtime.base_url}}/ssvn/portal/#/"
          state:
            url-match: true
    