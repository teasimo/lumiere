interaction:
  id: fr2-berechtigungen-delegieren
  version: 1.0

  
  video:
    autoscroll_smooth: false
    wait_between_steps: 1000
    resolution:
      width: 1280
      height: 720

  presentation:
    indicators:
      click:
        enabled: true
        before_ms: 100
        after_ms: 100
        fade_ms: 50  
  
  data:
    runtime:
      base_url: https://neo-test.de
    actor:
      username: schule_05320_schulleitung
      password: "!Neo-2405Neo!"
    personal:
      vorname: "Cheryl"
      nachname: "Edwards"    
  flow:
    - id: neo-login
      fragment: neo-login
      with:
        username: "{{actor.username}}"
        password: "{{actor.password}}"

    - id: vorbereitung
      flow:
        - id: personal-oeffnen
          fragment: neo-hauptmenue-personal-personalverwaltung
        - id: personal-suchen
          fragment: meldedaten-filter-vorname-nachname
          with:
            vorname: "{{personal.vorname}}"
            nachname: "{{personal.nachname}}"
        - id: oeffnen
          fragment: element-open-first
        - id: Einstellungen-oeffnen
          click: 
            text: "Einstellungen"
          
        

    - id: navigate-mein-profil
      fragment: neo-hauptmenue-mein-profil
      
      presentation:
        video:
          start: before
        didactics:
          purpose:
              text: >-
                Datenqualität ist in der Verwaltung sehr wichtig, um immer auf Basis der richtigen Informationen zu entscheiden. Wichtig hierfür ist, dass pro Schüler*in immer genau nur ein Datensatz mit allen bekannten Informationen vorliegt.
                Daher zeigen wir Ihnen im zum Einen wie NEO Niedersachsen Sie dabei unterstützt, dass keine doppelten Datensätze angelegt werden. Zum anderen wird Ihnen demonstriert, wie doppelte Datensätze, die dennoch entstanden sind, zu einem Datensatz zusammengeführt werden können.
          explanation:
            text: Es gibt für Schüler zwei Stellen an denen Schüler-Datensätze entstehen können. Dies ist zum einen der Bereich der Meldedaten. 
    
    # nur aufklappen, wenn noch was zugeklappt ist (z.B. durch vorige Interaktionen des laufnenden Tests)
    - id: btn/action-expandcollapseall
      if:
        target:
          data-id: g_prp_org_delegate/btn/action-insert-scope
        state:
          visible: false
      interaction:
        type: click
        target:
          data-id: btn/action-expandcollapseall

    - id: Einstellungen-oeffnen2
      click: 
        text: "Einstellungen"

    # Neuer Eintrag
    - id: g_prp_org_delegate/btn/action-insert-scope
      click: g_prp_org_delegate/btn/action-insert-scope

    - id: g_prp_org_delegate/$data0/funktion_anzeige
      select: g_prp_org_delegate/$data0/funktion_anzeige
      value: "Schulleitung"

    - id: g_prp_org_delegate/$data0/prp_name
      select: g_prp_org_delegate/$data0/prp_name
      value: "Meldedatenimport"

    - id: g_prp_org_delegate/$data0/empfaenger_display_name
      select: g_prp_org_delegate/$data0/empfaenger_display_name
      value: "{{personal.nachname}}, {{personal.vorname}}"

    - id: g_prp_org_delegate/$data0/bbo_wirksam_ab
      fill: g_prp_org_delegate/$data0/bbo_wirksam_ab
      value: "07.06.2026"
    
    - id: g_prp_org_delegate/$data0/bbo_wirksam_bis
      fill: g_prp_org_delegate/$data0/bbo_wirksam_bis
      value: "15.06.2026"

    - id: btn/action-save
      click: btn/action-save

    - id: ja-delegieren
      click:
        text: Ja

#  g_prp_org_delegate/$data0/prp_name <- der button hat eine falsche ID die doppelt verwendet wird
    - id: loeschen
      interaction: 
        type: click
        target:
          data-id: g_prp_org_delegate/$data0/prp_name        
        resultIndex: 1
    
    - id: ja-loeschen
      click:
        text: Ja